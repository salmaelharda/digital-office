<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المراسلات الصادرة - مكتب الضبط الرقمي</title>
    
    <!-- مكتبة Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    
    <!-- ربط خط Tajawal مباشرة من Google Fonts لضمان اشتغاله -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- ملف الـ CSS الموحد -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app">
        
        <!-- القائمة الجانبية (Sidebar) - الجهة اليمنى -->
        <aside class="sidebar">
            <div class="logo">
                <h3>مكتب الضبط</h3>
                <span>Bureau d'ordre</span>
            </div>
            <nav>
                <ul>
                    <li><a href="dashboard.html"><i class="fas fa-chart-pie"></i> لوحة التحكم</a></li>
                    <li><a href="arrivee.html"><i class="fas fa-inbox"></i> المراسلات الواردة</a></li>
                    <li class="active"><a href="depart.html"><i class="fas fa-paper-plane"></i> المراسلات الصادرة</a></li>
                    <li><a href="archive.html"><i class="fas fa-search"></i> الرئيسي والبحث</a></li>
                </ul>
            </nav>
            <div class="user-card">
                <p><i class="fas fa-user-circle"></i> s.elharda9418@uca.ac.ma</p>
                <span>مدير النظام</span>
                <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
            </div>
        </aside>

        <!-- المحتوى الرئيسي (Main Content) - الجهة اليسرى -->
        <main class="main">
            
            <!-- الهيدر العلوي: العنوان على اليمين والزر على اليسار -->
            <header class="top-bar">
                <div class="top-bar-text">
                    <h1>المراسلات الصادرة</h1>
                    <p>تسجيل وإدارة المراسلات الصادرة من المؤسسة</p>
                </div>
                <button class="btn-add">
                    <i class="fas fa-plus"></i> تسجيل مراسلة جديدة
                </button>
            </header>

            <!-- شريط البحث الاحترافي -->
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="ابحث برقم المراسلة، الموضوع، أو الاسم...">
            </div>

            <!-- كارد الجدول المستقر -->
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>الرقم</th>
                            <th>تاريخ الإرسال</th>
                            <th>المرسل إليه (Destinataire)</th>
                            <th>الموضوع</th>
                            <th>المرفق</th>
                        </tr>
                    </thead>
                    <tbody id="departBody">
                        <tr>
                            <td colspan="5" class="empty-row">
                                <p>لا توجد مراسلات مسجلة بعد</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <!-- ملف الـ JavaScript المشترك -->
    <script src="script.js"></script>
</body>
</html>
